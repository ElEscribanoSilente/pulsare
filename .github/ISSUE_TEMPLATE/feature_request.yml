name: Feature Request
description: Suggest an enhancement
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. Why do you need this?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work? Include API examples if possible.
      render: python
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternatives have you tried?

  - type: checkboxes
    id: constraints
    attributes:
      label: Compatibility
      options:
        - label: This can be implemented without adding external dependencies
          required: true
        - label: This fits within a single-file architecture
          required: true
